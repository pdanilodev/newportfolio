<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

<body>
  <canvas id="particles"></canvas>

  <main class="hero">

      <section class="hero-text">

          <div class="keycap fade-up" style="--d:560ms; --key-color:#61dafb">
